name: Send Tech Trending Daily via Gmail

on:
  schedule:
    # Every day at UTC 11:17 (7:17 PM in UTC+8)
    - cron: '17 11 * * *'

  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
      enableRemoteJobs:
        description: 'Whether to include the synced daily remote jobs report in the email'
        required: true
        default: true
        type: boolean

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set current date with timezone
        id: current-date
        run: echo "CURRENT_DATE=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Resolve remote jobs settings
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ENABLE_REMOTE_JOBS=${{ inputs.enableRemoteJobs }}" >> $GITHUB_ENV
          else
            echo "ENABLE_REMOTE_JOBS=true" >> $GITHUB_ENV
          fi
          echo "REMOTE_JOBS_REPORT_PATH=remote-jobs/daily_remote_jobs_$CURRENT_DATE.md" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get Trending Data
        uses: ./
        id: trending-repos
        env:
          token: ${{ secrets.GITHUB_TOKEN }}
        with:
          # GitHub Trending settings
          languages: '["", "typescript", "python", "go"]'
          dateRange: 'daily'
          # Extended features - set to 'false' to disable
          enableHuggingFace: 'true'
          enableHackerNews: 'true'
          enableDevTo: 'true'
          enableAIPapers: 'true'
          enableIndieRevenue: 'true'
          itemLimit: '10'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install yagmail

      # Send full trending email (new format)
      - name: Send trending email
        run: |
          python ./.github/actions/send_email.py \
            "${{ secrets.GMAIL_USERNAME }}" \
            "${{ secrets.GMAIL_PASSWORD }}" \
            "yugang.cao12@gmail.com" \
            "🔥 Tech Trending Daily - $CURRENT_DATE" \
            ${{ steps.trending-repos.outputs.trendingData }} \
            "$ENABLE_REMOTE_JOBS" \
            "$REMOTE_JOBS_REPORT_PATH"

      - name: Write github trending repos
        run: |
          python ./.github/actions/write_github_trending.py $CURRENT_DATE ${{ steps.trending-repos.outputs.githubTrendingRepos }}

      - name: Commit and push if changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "Update GitHub trending repos" || exit 0
          git push
